concept: ar_invoice
display_name: AR Invoice
module: accounts_receivable
description: >
  A customer invoice or debit/credit document recorded in Accounts 
  Receivable, representing an amount owed to the company. Tracks outstanding 
  balances, tax portions, dunning and delivery detail. Note: this table 
  carries no due-date or gross-original-value column; use 
  signed_invoice_value and terms_code.
synonyms:
  - customer invoice
  - sales invoice
  - receivable invoice
  - debtor invoice
  - billing document
header_attributes:
  customer_code:
    display: Customer Code
    type: string
    required: true
    description: Code of the customer the invoice belongs to
  invoice_number:
    display: Invoice Number
    type: string
    required: true
    description: Unique invoice/document identifier
  sales_order:
    display: Sales Order
    type: string
    required: false
    description: Sales order the invoice originated from
  customer_po_number:
    display: Customer PO Number
    type: string
    required: false
    description: Customer purchase order reference
  salesperson:
    display: Salesperson
    type: string
    required: false
    description: Salesperson code linked to the invoice
  branch:
