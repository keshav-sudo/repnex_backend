concept: ar_invoice
display_name: AR Invoice
module: accounts_receivable
description: >
  A customer invoice or debit/credit document recorded in Accounts
  Receivable, representing an amount owed to the company. Tracks invoice
  value, tax portions, outstanding balance and due date.
synonyms:
  - customer invoice
  - sales invoice
  - receivable invoice
  - debtor invoice
  - billing document
header_attributes:
  invoice_number:
    display: Invoice Number
    type: string
    required: true
    description: Unique invoice/document identifier
  customer_code:
    display: Customer Code
    type: string
    required: true
    description: Code of the customer the invoice belongs to
  document_type:
    display: Document Type
    type: string
    required: false
    description: Document type (e.g. I=Invoice, C=Credit note, D=Debit note)
  invoice_date:
    display: Invoice Date
    type: date
    required: true
    description: Date the invoice was raised
  due_date:
    display: Due Date
    type: date
    required: false
    description: Date the invoice payment falls due
  original_value:
    display: Original Invoice Value
    type: decimal
    required: true
    description: Gross invoice value at the time of capture
  outstanding_balance:
    display: Outstanding Balance
    type: decimal
    required: false
    description: Current unpaid balance of the invoice (local currency)
  signed_invoice_value:
    display: Signed Invoice Value
    type: decimal
    required: false
    description: Invoice value signed by debit/credit direction
  tax_portion:
    display: Tax Portion
    type: decimal
    required: false
    description: Tax portion of the invoice value
  signed_tax_portion:
    display: Signed Tax Portion
    type: decimal
    required: false
    description: Tax portion signed by debit/credit direction
  taxable_amount:
    display: Taxable Amount
    type: decimal
    required: false
    description: Original taxable amount of the invoice
  original_discount_value:
    display: Original Discount Value
    type: decimal
    required: false
    description: Settlement discount value available at capture
  currency:
    display: Currency
    type: string
    required: false
    description: Currency code of the invoice
  exchange_rate:
    display: Exchange Rate
    type: decimal
    required: false
    description: Currency conversion rate applied to the invoice
  sales_order:
    display: Sales Order
    type: string
    required: false
    description: Sales order the invoice originated from
  salesperson:
    display: Salesperson
    type: string
    required: false
    description: Salesperson code linked to the invoice
  terms_code:
    display: Terms Code
    type: string
    required: false
    description: Payment terms code applied to the invoice
  tax_code:
    display: Tax Code
    type: string
    required: false
    description: Tax code applied to the invoice
  branch:
    display: AR Branch
    type: string
    required: false
    description: Accounts receivable branch code
