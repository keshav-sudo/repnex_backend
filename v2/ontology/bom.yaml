# Business Concept: Bill of Materials
concept: bom
display_name: Bill of Materials
module: manufacturing
description: >
  The list of raw materials, components, and operations needed
  to manufacture a finished product.

synonyms:
  - BOM
  - bill of materials
  - recipe
  - product structure
  - component list

attributes:
  parent_item:
    display: Parent Item
    type: string
    required: true
  component_item:
    display: Component Item
    type: string
    required: true
  quantity_per:
    display: Quantity Per
    type: decimal
  uom:
    display: Unit of Measure
    type: string
  sequence:
    display: Sequence
    type: integer
  scrap_factor:
    display: Scrap Factor
    type: decimal
  operation:
    display: Operation
    type: string

relationships:
  - concept: inventory_item
    cardinality: many_to_many
  - concept: job_work_order
    cardinality: one_to_many
