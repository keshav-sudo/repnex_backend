# Business Concept: Payment
concept: payment
display_name: Payment
module: cash_book
description: >
  Payments received from customers (AR) or made to suppliers (AP).

synonyms:
  - cash receipt
  - check payment
  - supplier payment
  - customer receipt
  - electronic payment
  - EFT

attributes:
  payment_id:
    display: Payment ID / Check Number
    type: string
    required: true
  party_code:
    display: Party Code
    description: Customer or Supplier code
    type: string
  payment_date:
    display: Payment Date
    type: date
  amount:
    display: Amount
    type: decimal
  bank_code:
    display: Bank Code
    type: string
  payment_type:
    display: Payment Type
    description: AP Payment or AR Receipt
    type: string
  discount_taken:
    display: Discount Taken
    type: decimal

relationships:
  - concept: customer
    cardinality: many_to_one
  - concept: supplier
    cardinality: many_to_one
  - concept: cash_book
    cardinality: many_to_one
