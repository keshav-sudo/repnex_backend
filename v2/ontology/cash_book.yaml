# Business Concept: Cash Book Transaction
concept: cash_book
display_name: Cash Book
module: cash_book
description: >
  Transactions representing bank deposits, payments, withdrawals, and cash movements.

synonyms:
  - bank transaction
  - cash book entry
  - payment entry
  - bank receipt
  - bank payment
  - cash entry

attributes:
  bank_code:
    display: Bank Code
    type: string
    required: true
  reference:
    display: Reference
    type: string
  transaction_date:
    display: Transaction Date
    type: date
  amount:
    display: Amount
    type: decimal
  payment_method:
    display: Payment Method
    type: string
  reconciled:
    display: Reconciled Status
    type: boolean
  description:
    display: Description
    type: string
  posting_year:
    display: Posting Year
    type: integer
  posting_period:
    display: Posting Period
    type: integer

relationships:
  - concept: gl_account
    cardinality: many_to_one
