# Business Concept: Warehouse
concept: warehouse
display_name: Warehouse
module: inventory
description: >
  A storage location, warehouse, or distribution center for inventory.

synonyms:
  - site
  - storage location
  - warehouse location
  - store
  - distribution center

attributes:
  code:
    display: Warehouse Code
    type: string
    required: true
  name:
    display: Warehouse Name
    type: string
    required: true
  address:
    display: Address
    type: string
  branch:
    display: Branch
    type: string

relationships:
  - concept: inventory_item
    cardinality: many_to_many
  - concept: stock_movement
    cardinality: one_to_many
