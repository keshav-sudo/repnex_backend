# Business Concept: Inventory Item / Part
# A product, material, or SKU tracked in inventory.

concept: inventory_item
display_name: Inventory Item
module: inventory
description: >
  A physical product, raw material, or finished good tracked in the
  inventory system. Known as "Stock Code" in SYSPRO, "Part" in Epicor.

synonyms:
  - part
  - product
  - stock code
  - stock item
  - SKU
  - material
  - component
  - item
  - finished good
  - raw material

attributes:
  code:
    display: Item Code
    description: Unique identifier (stock code / part number)
    type: string
    required: true

  description:
    display: Description
    description: Full item description
    type: string
    required: true

  short_description:
    display: Short Description
    description: Abbreviated description
    type: string

  product_class:
    display: Product Class
    description: Classification grouping
    type: string

  unit_of_measure:
    display: Unit of Measure
    description: Default UOM (Each, Kg, etc.)
    type: string

  item_type:
    display: Item Type
    description: Stocked, Non-stocked, Phantom, etc.
    type: string

  cost:
    display: Unit Cost
    description: Standard or average cost
    type: decimal

  selling_price:
    display: Selling Price
    description: Default selling price
    type: decimal

  weight:
    display: Weight
    description: Unit weight
    type: decimal

  volume:
    display: Volume
    description: Unit volume
    type: decimal

  lead_time:
    display: Lead Time
    description: Procurement or manufacturing lead time in days
    type: integer

  reorder_point:
    display: Reorder Point
    description: Minimum stock level before reorder
    type: decimal

  on_hand_qty:
    display: On Hand Quantity
    description: Total quantity in stock
    type: decimal

  on_order_qty:
    display: On Order Quantity
    description: Quantity on purchase orders
    type: decimal

  allocated_qty:
    display: Allocated Quantity
    description: Quantity allocated to sales/jobs
    type: decimal

  available_qty:
    display: Available Quantity
    description: On hand minus allocated
    type: decimal

relationships:
  - concept: warehouse
    cardinality: many_to_many
    description: Item is stocked across warehouses

  - concept: sales_order
    cardinality: one_to_many
    description: Item appears on sales order lines

  - concept: purchase_order
    cardinality: one_to_many
    description: Item appears on purchase order lines

  - concept: bom
    cardinality: one_to_many
    description: Item has a bill of materials

  - concept: stock_movement
    cardinality: one_to_many
    description: Item has stock transaction history

  - concept: supplier
    cardinality: many_to_many
    description: Item can be supplied by multiple vendors
