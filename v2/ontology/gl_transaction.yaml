concept: gl_transaction
display_name: GL Transaction
module: general_ledger
description: >
  A posted General Ledger transaction line, carrying the GL account, 
  financial year/period, journal, value and full sub-module cross-references 
  (AP/AR invoices, suppliers, customers, banks, assets, jobs, stock).
synonyms:
  - general ledger transaction
  - gl entry
  - journal entry
  - ledger posting
  - gl detail
