# Business Concept: GL Transaction
concept: gl_transaction
display_name: GL Transaction
module: general_ledger
description: >
  A posted financial transaction in the general ledger.

synonyms:
  - journal entry
  - GL entry
  - ledger entry
  - journal posting
  - GL posting

attributes:
  journal_number:
    display: Journal Number
    type: string
  gl_code:
    display: GL Code
    type: string
    required: true
  year:
    display: Financial Year
    type: integer
  period:
    display: Financial Period
    type: integer
  transaction_date:
    display: Transaction Date
    type: date
  value:
    display: Value
    type: decimal
  reference:
    display: Reference
    type: string
  description:
    display: Description
    type: string
  source:
    display: Source Module
    description: AR, AP, CB, INV, etc.
    type: string

relationships:
  - concept: gl_account
    cardinality: many_to_one
