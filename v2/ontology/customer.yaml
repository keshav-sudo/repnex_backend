concept: customer
display_name: Customer
module: accounts_receivable
description: >
  A customer (debtor) master record in Accounts Receivable, holding
  identification, credit control, activity dates and, via the balance
  table, current outstanding balances and ageing buckets.
synonyms:
  - debtor
  - client
  - account
  - buyer
header_attributes:
  customer_code:
    display: Customer Code
    type: string
    required: true
    description: Unique customer identifier
  customer_name:
    display: Customer Name
    type: string
    required: true
    description: Trading name of the customer
  branch:
    display: Branch
    type: string
    required: false
    description: Default AR branch for the customer
  area:
    display: Area
    type: string
    required: false
    description: Geographic/sales area code
  state:
    display: State
    type: string
    required: false
    description: State or province code
  nationality:
    display: Nationality
    type: string
    required: false
    description: Nationality/country code of the customer
  salesperson:
    display: Salesperson
    type: string
    required: false
    description: Default salesperson code for the customer
  currency:
    display: Currency
    type: string
    required: false
    description: Default currency the customer trades in
  credit_limit:
    display: Credit Limit
    type: decimal
    required: false
    description: Approved credit limit for the customer
  credit_status:
    display: Credit Status
    type: string
    required: false
    description: Credit status/check code for the customer
  on_hold:
    display: On Hold
    type: string
    required: false
    description: Indicates whether the customer account is on hold
  payment_status:
    display: Payment Status
    type: string
    required: false
    description: Payment behaviour status of the customer
  master_account:
    display: Master Account
    type: string
    required: false
    description: Master (head-office) account this customer rolls up to
  date_added:
    display: Date Added
    type: date
    required: false
    description: Date the customer record was created
  date_last_sale:
    display: Date of Last Sale
    type: date
    required: false
    description: Date of the most recent sale to the customer
  date_last_payment:
    display: Date of Last Payment
    type: date
    required: false
    description: Date of the most recent payment from the customer
  outstanding_order_value:
    display: Outstanding Order Value
    type: decimal
    required: false
    description: Value of open sales orders not yet invoiced
  current_balance:
    display: Current Balance
    type: decimal
    required: false
    description: Current outstanding receivable balance
  ageing_current:
    display: Ageing - Current
    type: decimal
    required: false
    description: Invoice value not yet due (current bucket)
  ageing_30_days:
    display: Ageing - 30 Days
    type: decimal
    required: false
    description: Invoice value 1-30 days overdue
  ageing_60_days:
    display: Ageing - 60 Days
    type: decimal
    required: false
    description: Invoice value 31-60 days overdue
  ageing_90_days:
    display: Ageing - 90 Days
    type: decimal
    required: false
    description: Invoice value 61-90 days overdue
  ageing_120_days:
    display: Ageing - 120+ Days
    type: decimal
    required: false
    description: Invoice value more than 90 days overdue
