concept: customer
display_name: Customer
module: accounts_receivable
description: >
  A customer (debtor) master record in Accounts Receivable, holding 
  identification, credit control, contact, address and activity detail, plus 
  - via the balance table - current balances, ageing buckets and sales 
  statistics.
synonyms:
  - debtor
  - client
  - account
  - buyer
