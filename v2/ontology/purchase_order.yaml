concept: purchase_order
display_name: Purchase Order
module: purchasing
description: >
  A purchase order raised on a supplier, consisting of a header (supplier,
  dates, status) and one or more detail lines (stock code, quantities,
  price). Universal concept only - map per ERP once a verified PO schema
  is available for that target.
synonyms:
  - PO
  - purchase requisition
  - order to supplier
  - procurement order
header_attributes:
  purchase_order_number:
    display: Purchase Order Number
    type: string
    required: true
    description: Unique purchase order identifier
  supplier_code:
    display: Supplier Code
    type: string
    required: true
    description: Supplier the order is placed with
  order_status:
    display: Order Status
    type: string
    required: false
    description: Current status of the purchase order
  order_date:
    display: Order Date
    type: date
    required: false
    description: Date the purchase order was created
  due_date:
    display: Due Date
    type: date
    required: false
    description: Expected receipt/delivery date
  currency:
    display: Currency
    type: string
    required: false
    description: Currency of the purchase order
detail_attributes:
  line_number:
    display: Line Number
    type: integer
    required: true
    description: Purchase order line sequence
  stock_code:
    display: Stock Code
    type: string
    required: false
    description: Stock/item code ordered on the line
  description:
    display: Line Description
    type: string
    required: false
    description: Description of the ordered item or service
  order_quantity:
    display: Order Quantity
    type: decimal
    required: false
    description: Quantity ordered on the line
  received_quantity:
    display: Received Quantity
    type: decimal
    required: false
    description: Quantity received to date on the line
  price:
    display: Price
    type: decimal
    required: false
    description: Unit price on the line
  line_value:
    display: Line Value
    type: decimal
    required: false
    description: Extended value of the line
