concept: ap_invoice
display_name: AP Invoice
module: accounts_payable
description: >
  A supplier (vendor) invoice recorded in Accounts Payable, representing an 
  amount the company owes. Tracks invoice value, outstanding balances, due 
  date, settlement discount, tax and currency-conversion detail.
synonyms:
  - supplier invoice
  - vendor invoice
  - payable invoice
  - creditor invoice
  - purchase invoice
  - bill
header_attributes:
  supplier_code:
    display: Supplier Code
    type: string
    required: true
    description: Code of the supplier the invoice belongs to
  invoice_number:
    display: Invoice Number
    type: string
    required: true
    description: Unique invoice identifier issued by the supplier
  branch:
