concept: supplier
display_name: Supplier
module: accounts_payable
description: >
  A supplier (vendor/creditor) master record in Accounts Payable, holding
  identification, currency, current balance and purchase history statistics.
synonyms:
  - vendor
  - creditor
  - payee
  - seller
header_attributes:
  supplier_code:
    display: Supplier Code
    type: string
    required: true
    description: Unique supplier identifier
  supplier_name:
    display: Supplier Name
    type: string
    required: true
    description: Trading name of the supplier
  supplier_class:
    display: Supplier Class
    type: string
    required: false
    description: Classification/grouping code for the supplier
  currency:
    display: Currency
    type: string
    required: false
    description: Default currency the supplier trades in
  current_balance:
    display: Current Balance
    type: decimal
    required: false
    description: Current outstanding balance owed to the supplier
  last_purchase_date:
    display: Last Purchase Date
    type: date
    required: false
    description: Date of the most recent purchase from this supplier
  last_payment_date:
    display: Last Payment Date
    type: date
    required: false
    description: Date of the most recent cheque/payment to this supplier
  last_payment_value:
    display: Last Payment Value
    type: decimal
    required: false
    description: Value of the most recent cheque/payment
  withholding_tax_code:
    display: Withholding Tax Code
    type: string
    required: false
    description: Withholding tax code applied to this supplier
  withholding_tax_id:
    display: Withholding Tax ID
    type: string
    required: false
    description: Supplier withholding tax registration identifier
  purchases_month_1:
    display: Purchases Month 1
    type: decimal
    required: false
    description: Purchase value for financial month 1 of the current year
  prior_year_merchandise_value:
    display: Prior Year Merchandise Value
    type: decimal
    required: false
    description: Merchandise purchases in the prior financial year
  prior_year_freight_value:
    display: Prior Year Freight Value
    type: decimal
    required: false
    description: Freight charges in the prior financial year
  prior_year_other_value:
    display: Prior Year Other Value
    type: decimal
    required: false
    description: Other charges in the prior financial year
  purchases_year_to_date:
    display: Purchases Year to Date
    type: decimal
    required: false
    description: Total purchase value across all financial months of the current year (calculated)
  prior_year_total_value:
    display: Prior Year Total Value
    type: decimal
    required: false
    description: Total prior-year value (merchandise + freight + other, calculated)
