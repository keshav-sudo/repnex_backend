# Business Concept: GL Account
concept: gl_account
display_name: GL Account
module: general_ledger
description: >
  A ledger account in the chart of accounts used for financial reporting.

synonyms:
  - ledger account
  - GL code
  - chart of accounts
  - account
  - general ledger account
  - COA

attributes:
  gl_code:
    display: GL Code
    type: string
    required: true
  description:
    display: Description
    type: string
    required: true
  account_type:
    display: Account Type
    description: Asset, Liability, Revenue, Expense, Equity
    type: string
  group:
    display: Account Group
    type: string
  current_balance:
    display: Current Balance
    type: decimal
  ptd_debit:
    display: Period-to-Date Debits
    type: decimal
  ptd_credit:
    display: Period-to-Date Credits
    type: decimal
  on_hold:
    display: On Hold
    type: boolean
  control_account:
    display: Control Account
    description: Whether this is a subledger control account
    type: boolean

relationships:
  - concept: gl_transaction
    cardinality: one_to_many
