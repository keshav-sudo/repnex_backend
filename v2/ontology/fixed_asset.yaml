# Business Concept: Fixed Asset
concept: fixed_asset
display_name: Fixed Asset
module: fixed_assets
description: >
  A long-term tangible piece of property or equipment owned by the company.

synonyms:
  - asset
  - fixed asset
  - property plant equipment
  - machinery
  - capital asset

attributes:
  asset_code:
    display: Asset Code
    type: string
    required: true
  description:
    display: Description
    type: string
    required: true
  asset_class:
    display: Asset Class
    type: string
  purchase_date:
    display: Purchase Date
    type: date
  purchase_cost:
    display: Purchase Cost
    type: decimal
  accumulated_depreciation:
    display: Accumulated Depreciation
    type: decimal
  book_value:
    display: Net Book Value
    type: decimal
  current_depreciation:
    display: Current Depreciation
    type: decimal
  status:
    display: Status
    type: string

relationships:
  - concept: gl_account
    cardinality: many_to_one
