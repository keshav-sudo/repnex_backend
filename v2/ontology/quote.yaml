# Business Concept: Quote / Quotation
concept: quote
display_name: Quote
module: sales
description: >
  A proposal or quotation sent to a customer before an order.

synonyms:
  - quotation
  - estimate
  - proposal
  - quote
  - sales quote

header_attributes:
  quote_number:
    display: Quote Number
    type: string
    required: true
  customer_code:
    display: Customer
    type: string
  quote_date:
    display: Quote Date
    type: date
  expiry_date:
    display: Expiry Date
    type: date
  status:
    display: Status
    type: string
  total_value:
    display: Total Value
    type: decimal
  salesperson:
    display: Salesperson
    type: string

detail_attributes:
  line_number:
    display: Line Number
    type: integer
  item_code:
    display: Item Code
    type: string
  quantity:
    display: Quantity
    type: decimal
  unit_price:
    display: Unit Price
    type: decimal
  line_total:
    display: Line Total
    type: decimal

relationships:
  - concept: customer
    cardinality: many_to_one
  - concept: sales_order
    cardinality: one_to_one
    description: Quote converts to sales order
