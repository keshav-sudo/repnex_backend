# Epicor Mapping for Purchase Order
concept: purchase_order
header_table: Erp.POHeader
detail_table: Erp.PODetail
primary_key: PONum

header_fields:
  po_number: PONum
  supplier_code: VendorNum
  order_date: OrderDate
  due_date: DueDate
  status: ApprovalStatus
  buyer: BuyerID
  currency: CurrencyCode
  warehouse: ShipToNum

detail_fields:
  line_number: POLine
  item_code: PartNum
  description: LineDesc
  quantity_ordered: OrderQty
  quantity_received: ReceivedQty
  unit_price: DocUnitCost
  line_total: "(ReceivedQty * DocUnitCost)"
  warehouse: WarehouseCode
