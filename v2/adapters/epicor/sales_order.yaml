# Epicor Mapping for Sales Order
concept: sales_order
header_table: Erp.OrderHed
detail_table: Erp.OrderDtl
primary_key: OrderNum

header_fields:
  order_number: OrderNum
  customer_code: CustNum
  order_date: OrderDate
  required_date: NeedByDate
  order_status: OpenOrder
  order_type: OrderType
  salesperson: SalesRepList
  branch: Company
  currency: CurrencyCode
  order_total: DocOrderAmt
  tax_total: DocTaxAmt
  customer_po: PONum
  warehouse: WarehouseCode

detail_fields:
  line_number: OrderLine
  item_code: PartNum
  description: LineDesc
  quantity_ordered: OrderQty
  quantity_shipped: OurJobQty
  quantity_outstanding: RemainingQty
  unit_price: DocUnitPrice
  line_total: DocExtPrice
  discount: DiscountPercent
  warehouse: WarehouseCode
