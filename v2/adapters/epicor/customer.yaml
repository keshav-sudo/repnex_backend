# Epicor Mapping for Customer
concept: customer
table: Erp.Customer
primary_key: CustNum

fields:
  code: CustID
  name: Name
  short_name: Name # Epicor doesn't have a direct short name field standard, fallback to Name
  credit_limit: CreditLimit
  credit_status: CreditStatus # or CreditHold/HoldStatus
  currency: CurrencyCode
  branch: TerritoryID
  area: TerritoryID
  salesperson: SalesRepList
  customer_class: CustGroup
  tax_status: TaxLiable
  email: EMailAddress
  telephone: PhoneNum
  on_hold: CreditHold
  date_added: DateGRC
  last_sale_date: LastSaleDate
  last_payment_date: LastPayDate

balance_mapping:
  table: Erp.Customer
  join_on: CustNum
  fields:
    current_balance: CustAgingBal
    ytd_sales: YTDSales
    prev_year_sales: LYTSales
    outstanding_orders: OpenOrderAmt
    aging_current: AgingBal01
    aging_30: AgingBal02
    aging_60: AgingBal03
    aging_90: AgingBal04
    aging_120: AgingBal05
