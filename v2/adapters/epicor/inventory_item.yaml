# Epicor Mapping for Inventory Item
concept: inventory_item
table: Erp.Part
primary_key: PartNum

fields:
  code: PartNum
  description: PartDescription
  short_description: PartDescription
  product_class: ProdCode
  unit_of_measure: IUM
  item_type: TypeCode
  cost: StandardCost # Epicor uses PartCost for standard cost usually
  selling_price: BasePrice
  weight: NetWeight
  volume: NetVolume
  lead_time: LeadTime
  reorder_point: MinimumQty
  on_hand_qty: OnHandQty
  on_order_qty: OnOrderQty
  allocated_qty: AllocatedQty
  available_qty: "(OnHandQty - AllocatedQty)"
