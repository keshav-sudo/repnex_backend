erp: syspro
display_name: SYSPRO
dialect: mysql
database: railway
schema: railway
description: >
  SYSPRO ERP adapter (MySQL / Railway). Table and column names are
  case-exact against the migrated Railway MySQL instance.
  Data migrated from SysproEdu2 MSSQL backup. All queries must use MySQL syntax.
  InvMaster / InvWarehouse column subset verified from working template corpus.

