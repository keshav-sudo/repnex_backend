erp: syspro
display_name: SYSPRO
dialect: mssql
description: >
  SYSPRO ERP adapter (SQL Server / T-SQL). Table and column names are
  case-exact and verified against the template corpus in
  app/query_engine/templates/all_templates_combined.json
  (see v2/schema/syspro_schema_derived.txt for the derived inventory).
default_aliases:
  ap_invoice: i
  supplier: s
  ar_invoice: t
  customer: c
conventions:
  quote_style: none          # SYSPRO tables need no bracket quoting
  date_function: GETDATE()
  limit_syntax: "TOP %(limit)s"
concepts_mapped:
  - ap_invoice
  - supplier
  - ar_invoice
  - customer
concepts_unmapped:
  purchase_order: >
    No purchase order tables (e.g. PorMasterHdr / PorMasterDetail) appear in
    the verified schema derived from the template corpus. Mapping is
    intentionally omitted to comply with the no-hallucination rule; add it
    once a real SYSPRO PO schema is supplied.
