default_aliases:
  ap_invoice: i
  supplier: s
  ar_invoice: t
  customer: c
  gl_transaction: g
  inventory_item: m
auxiliary_aliases:
  ArCustomerBal: b
  InvWarehouse: w
conventions:
  quote_style: backtick       # MySQL uses backticks for identifiers
  date_function: NOW()
  limit_syntax: "LIMIT %(limit)s"
  ytd_filter: "[date_col] >= DATE_FORMAT(NOW(), '%Y-01-01')"
  safe_divide: "NULLIF(denominator, 0)"
  cast_numeric: "CAST(expr AS DECIMAL(18,4))"
concepts_mapped:
  - ap_invoice
  - supplier
  - ar_invoice
  - customer
  - gl_transaction
  - inventory_item
notes:
  ar_invoice: >
    ArInvoice in SysproEdu2 has no DueDate, OrigInvValue, Currency or
    MthInvBal1 columns. Outstanding balance maps to InvoiceBal1, invoice
    value to DrCrInvoiceValue (signed), currency detail to PostCurrency /
    CurrencyValue, and due dates must be derived from TermsCode.
  gl_transaction: >
    Customer/supplier joins use PrimaryCustomer / PrimarySupplier per the
    integration spec; SubModCustomer / SubModSupplier are alternative keys
    populated by the originating sub-module posting.
