default_aliases:
  ap_invoice: i
  ap_payment: ap
  ar_invoice: t
  customer: c
  gl_account: ga
  gl_transaction: g
  inventory_item: m
  purchase_order: ph
  sales_order: so
  supplier: s
conventions:
  quote_style: bracket
  date_function: GETDATE()
  limit_syntax: TOP %(limit)s
  ytd_filter: '[date_col] >= DATEFROMPARTS(YEAR(GETDATE()),1,1)'
  safe_divide: NULLIF(denominator, 0)
  cast_numeric: CAST(expr AS DECIMAL(18,4))
multi_erp_note: The Universal Ontology (v2/ontology/) is ERP-AGNOSTIC. The same concept
  names (e.g. sales_order, customer, inventory_item) can be connected to SAP, NetSuite,
  Oracle, Microsoft Dynamics, Helios, or any other ERP by adding a new adapter directory
  under v2/adapters/<erp_name>/. No changes to the ontology or the query engine are
  required.
validation_status:
  schema_verified: true
  invalid_columns_removed: 0
  manual_adapters_intact: 10
  total_adapters: 1309
notes:
  ar_invoice: ArInvoice has no DueDate, OrigInvValue or MthInvBal1. Outstanding balance
    = InvoiceBal1, invoice value = DrCrInvoiceValue.
  gl_transaction: Customer/supplier joins use PrimaryCustomer/PrimarySupplier. SubModCustomer/SubModSupplier
    are alternative keys.
  inventory_item: InvMaster is the master; InvWarehouse holds per-warehouse qty/cost.
