# SYSPRO Mapping for Cash Book Transaction
concept: cash_book
table: CshTransactions
primary_key: Bank # composite with TrnReference, TrnDate

fields:
  bank_code: Bank
  reference: TrnReference
  transaction_date: TrnDate
  amount: TrnValue
  payment_method: TrnType
  reconciled: ReconciledFlag
  description: Narration
  posting_year: CbTrnYear
  posting_period: CbTrnMonth
