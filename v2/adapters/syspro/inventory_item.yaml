# SYSPRO Mapping for Inventory Item
concept: inventory_item
table: InvMaster
primary_key: StockCode

fields:
  code: StockCode
  description: Description
  short_description: Description
  product_class: ProductClass
  unit_of_measure: StockUom
  item_type: StockOnHold
  cost: "(MaterialCost + LabourCost)"
  selling_price: ListPriceCode
  weight: Mass
  volume: Volume
  lead_time: LeadTime

balance_mapping:
  table: InvWarehouse
  join_on: StockCode
  fields:
    on_hand_qty: "SUM(QtyOnHand)"
    on_order_qty: "SUM(QtyOnOrder)"
    allocated_qty: "SUM(QtyAllocated)"
    available_qty: "SUM(QtyOnHand - QtyAllocated)"
  group_by: StockCode
