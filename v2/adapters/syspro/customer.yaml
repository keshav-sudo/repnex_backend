concept: customer
table: ArCustomer
alias: c
fields:
  customer_code: c.Customer
  customer_name: c.Name
  branch: c.Branch
  area: c.Area
  state: c.State
  nationality: c.Nationality
  salesperson: c.Salesperson
  currency: c.Currency
  credit_limit: c.CreditLimit
  credit_status: c.CreditStatus
  on_hold: c.CustomerOnHold
  payment_status: c.PaymentStatus
  master_account: c.MasterAccount
  date_added: c.DateCustAdded
  date_last_sale: c.DateLastSale
  date_last_payment: c.DateLastPay
  outstanding_order_value: c.OutstOrdVal
balance_mapping:
  table: ArCustomerBal
  alias: b
  join_on: c.Customer = b.Customer
  fields:
    current_balance: b.CurrentBalance
    ageing_current: b.ValCurrentInv
    ageing_30_days: b.Val30daysInv
    ageing_60_days: b.Val60daysInv
    ageing_90_days: b.Val90daysInv
    ageing_120_days: b.Val120daysInv
