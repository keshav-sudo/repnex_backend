concept: ar_invoice
table: ArInvoice
alias: t
fields:
  invoice_number: t.Invoice
  customer_code: t.Customer
  document_type: t.DocumentType
  invoice_date: t.InvoiceDate
  due_date: t.DueDate
  original_value: t.OrigInvValue
  outstanding_balance: t.MthInvBal1
  signed_invoice_value: t.DrCrInvoiceValue
  tax_portion: t.TaxPortion
  signed_tax_portion: t.DrCrTaxPortion
  taxable_amount: t.OrigTaxableAmt
  original_discount_value: t.OrigDiscValue
  currency: t.Currency
  exchange_rate: t.CurrencyValue
  sales_order: t.SalesOrder
  salesperson: t.Salesperson
  terms_code: t.TermsCode
  tax_code: t.TaxCode
  branch: t.Branch
default_filters:
  invoices_only: "t.DocumentType = 'I'"
  outstanding_only: "t.MthInvBal1 <> 0"
