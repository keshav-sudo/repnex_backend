concept: gl_journal
table: hx_gl_journal
alias: j
fields:
  journal_id: j.journal_id
  journal_number: j.journal_number
  journal_date: j.journal_date
  reference: j.reference
  source_module: j.source_module
  description: j.description
  total_debit: j.total_debit
  total_credit: j.total_credit
  status: j.status
filters:
  posted: "j.status = 'Posted'"
  sales_module: "j.source_module = 'Sales'"
  purchase_module: "j.source_module = 'Purchase'"
common_queries:
  - "GL journal entries"
  - "Trial balance"
  - "Journal entries by account"
  - "Debit/credit summary by module"
  - "Monthly GL totals"
joins:
  journal_lines:
    table: hx_gl_journal_line
    alias: jl
    on: "j.journal_id = jl.journal_id"
  coa:
    table: hx_coa
    alias: a
    on: "jl.account_id = a.account_id"
sample_sql: >
  SELECT a.account_code, a.account_name, a.account_type,
         SUM(jl.debit_amount) AS total_debit,
         SUM(jl.credit_amount) AS total_credit,
         SUM(jl.debit_amount - jl.credit_amount) AS net_balance
  FROM hx_gl_journal_line jl
  JOIN hx_coa a ON jl.account_id = a.account_id
  JOIN hx_gl_journal j ON jl.journal_id = j.journal_id
  WHERE j.status = 'Posted'
  GROUP BY a.account_id, a.account_code, a.account_name, a.account_type
  ORDER BY a.account_code
