concept: customer
table: hx_customer
alias: c
fields:
  customer_id: c.customer_id
  customer_code: c.customer_code
  customer_name: c.customer_name
  contact_person: c.contact_person
  email: c.email
  phone: c.phone
  city: c.city
  credit_limit: c.credit_limit
  payment_terms_days: c.payment_terms_days
  is_active: c.is_active
filters:
  active_only: "c.is_active = 1"
common_queries:
  - "Top customers by revenue"
  - "Customer list with credit limits"
  - "Customers by city"
  - "Active customers"
  - "Customer outstanding balances"
  - "Customers exceeding credit limit"
  - "Customer payment terms"
joins:
  sales_orders:
    table: hx_sales_order
    alias: so
    on: "c.customer_id = so.customer_id"
  sales_invoices:
    table: hx_sales_invoice
    alias: si
    on: "c.customer_id = si.customer_id"
sample_sql:
  top_customers_by_revenue: >
    SELECT c.customer_code, c.customer_name, c.city,
           COUNT(si.invoice_id) AS invoice_count,
           COALESCE(SUM(si.total_amount), 0) AS total_revenue,
           COALESCE(SUM(si.total_amount - si.amount_paid), 0) AS total_outstanding
    FROM hx_customer c
    LEFT JOIN hx_sales_invoice si ON c.customer_id = si.customer_id
    WHERE c.is_active = 1
    GROUP BY c.customer_id, c.customer_code, c.customer_name, c.city
    ORDER BY total_revenue DESC
    LIMIT 10
  customers_over_credit_limit: >
    SELECT c.customer_code, c.customer_name, c.credit_limit,
           COALESCE(SUM(si.total_amount - si.amount_paid), 0) AS outstanding
    FROM hx_customer c
    LEFT JOIN hx_sales_invoice si ON c.customer_id = si.customer_id
      AND si.status IN ('Unpaid', 'Partial')
    WHERE c.is_active = 1
    GROUP BY c.customer_id, c.customer_code, c.customer_name, c.credit_limit
    HAVING COALESCE(SUM(si.total_amount - si.amount_paid), 0) > c.credit_limit
    ORDER BY outstanding DESC
