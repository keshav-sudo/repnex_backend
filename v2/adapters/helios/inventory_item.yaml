concept: inventory_item
table: hx_item
alias: i
fields:
  item_id: i.item_id
  item_code: i.item_code
  item_name: i.item_name
  category: i.category
  uom_code: i.uom_code
  std_cost: i.std_cost
  list_price: i.list_price
  reorder_level: i.reorder_level
  is_active: i.is_active
calculated_fields:
  margin_pct: "ROUND((CAST(i.list_price - i.std_cost AS NUMERIC) / NULLIF(CAST(i.list_price AS NUMERIC), 0)) * 100, 2)"
filters:
  active_only: "i.is_active = 1"
common_queries:
  - "Item list with prices"
  - "Low stock items"
  - "Items below reorder level"
  - "Items by category"
  - "Best selling items"
  - "Slow moving inventory"
  - "Inventory valuation"
  - "Stock on hand by warehouse"
  - "Item profit margin"
joins:
  uom:
    table: hx_uom
    alias: u
    on: "i.uom_code = u.uom_code"
  stock_ledger:
    table: hx_stock_ledger
    alias: sl
    on: "i.item_id = sl.item_id"
  warehouse:
    table: hx_warehouse
    alias: w
    on: "sl.warehouse_id = w.warehouse_id"
  sales_invoice_lines:
    table: hx_sales_invoice_line
    alias: sil
    on: "i.item_id = sil.item_id"
  purchase_bill_lines:
    table: hx_purchase_bill_line
    alias: pbl
    on: "i.item_id = pbl.item_id"
sample_sql:
  stock_on_hand: >
    SELECT i.item_code, i.item_name, i.category, w.warehouse_name,
           sl.running_balance_qty AS stock_qty,
           sl.running_balance_value AS stock_value
    FROM hx_stock_ledger sl
    JOIN hx_item i ON sl.item_id = i.item_id
    JOIN hx_warehouse w ON sl.warehouse_id = w.warehouse_id
    WHERE sl.ledger_id IN (
      SELECT MAX(ledger_id) FROM hx_stock_ledger
      GROUP BY item_id, warehouse_id
    )
    ORDER BY i.item_code, w.warehouse_code
  below_reorder: >
    SELECT i.item_code, i.item_name, i.category, i.reorder_level,
           COALESCE(sub.qty_on_hand, 0) AS qty_on_hand
    FROM hx_item i
    LEFT JOIN (
      SELECT sl2.item_id, sl2.running_balance_qty AS qty_on_hand
      FROM hx_stock_ledger sl2
      WHERE sl2.ledger_id IN (
        SELECT MAX(ledger_id) FROM hx_stock_ledger GROUP BY item_id, warehouse_id
      )
    ) sub ON i.item_id = sub.item_id
    WHERE i.is_active = 1
      AND COALESCE(sub.qty_on_hand, 0) < i.reorder_level
    ORDER BY qty_on_hand ASC
  inventory_valuation: >
    SELECT i.item_code, i.item_name,
           SUM(sl.running_balance_qty) AS total_qty,
           SUM(sl.running_balance_value) AS total_value
    FROM hx_stock_ledger sl
    JOIN hx_item i ON sl.item_id = i.item_id
    WHERE sl.ledger_id IN (
      SELECT MAX(ledger_id) FROM hx_stock_ledger
      GROUP BY item_id, warehouse_id
    )
    GROUP BY i.item_code, i.item_name
    ORDER BY total_value DESC
  best_selling_items: >
    SELECT i.item_code, i.item_name, i.category,
           SUM(sil.quantity) AS total_qty_sold,
           SUM(sil.line_subtotal) AS total_revenue
    FROM hx_sales_invoice_line sil
    JOIN hx_item i ON sil.item_id = i.item_id
    GROUP BY i.item_code, i.item_name, i.category
    ORDER BY total_qty_sold DESC
    LIMIT 10
