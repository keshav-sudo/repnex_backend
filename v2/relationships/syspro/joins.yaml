# SYSPRO join graph for the V2 semantic engine.
# Every condition uses the aliases declared in the adapters
# (i=ApInvoice, s=ApSupplier, t=ArInvoice, c=ArCustomer, b=ArCustomerBal)
# and mirrors the join patterns used by the verified template corpus.
relationships:
  - from_concept: ap_invoice
    to_concept: supplier
    cardinality: many_to_one
    join_type: LEFT
    condition: i.Supplier = s.Supplier

  - from_concept: supplier
    to_concept: ap_invoice
    cardinality: one_to_many
    join_type: LEFT
    condition: s.Supplier = i.Supplier

  - from_concept: ar_invoice
    to_concept: customer
    cardinality: many_to_one
    join_type: LEFT
    condition: t.Customer = c.Customer

  - from_concept: customer
    to_concept: ar_invoice
    cardinality: one_to_many
    join_type: LEFT
    condition: c.Customer = t.Customer

  # Customer master to its balance/ageing record (also declared inline
  # in adapters/syspro/customer.yaml as balance_mapping)
  - from_concept: customer
    to_concept: customer_balance
    cardinality: one_to_one
    join_type: LEFT
    condition: c.Customer = b.Customer
