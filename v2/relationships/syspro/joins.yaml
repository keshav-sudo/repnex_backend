# SYSPRO Join Relationship Graph
# Describes the direct join paths between database tables.

relationships:
  - from_concept: customer
    to_concept: sales_order
    join_type: inner
    condition: "ArCustomer.Customer = SorMaster.Customer"

  - from_concept: customer
    to_concept: ar_invoice
    join_type: inner
    condition: "ArCustomer.Customer = ArInvoice.Customer"

  - from_concept: customer
    to_concept: customer_balance
    join_type: left
    condition: "ArCustomer.Customer = ArCustomerBal.Customer"

  - from_concept: sales_order
    to_concept: sales_order_line
    join_type: inner
    condition: "SorMaster.SalesOrder = SorDetail.SalesOrder"

  - from_concept: ar_invoice
    to_concept: ar_invoice_line
    join_type: inner
    condition: "ArInvoice.Invoice = ArTrnDetail.Invoice"

  - from_concept: supplier
    to_concept: purchase_order
    join_type: inner
    condition: "ApSupplier.Supplier = PorMasterHdr.Supplier"

  - from_concept: purchase_order
    to_concept: purchase_order_line
    join_type: inner
    condition: "PorMasterHdr.PurchaseOrder = PorMasterDetail.PurchaseOrder"
